name: fuchsbau
description: >
  Shared design system for the fuchs family of apps — the pinned tangerine
  triad palette, theme builder, fonts, and status colours. See DESIGN.md /
  ETHOS.md / TECH_STACK.md in this repo for the specification.
version: 0.2.0
publish_to: none

environment:
  sdk: ^3.12.2
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  fonts:
    # Figtree — the brand voice (OFL, bundled). Variable weight axis; Flutter
    # maps FontWeight to the wght axis automatically.
    - family: Figtree
      fonts:
        - asset: assets/fonts/Figtree.ttf
    # Atkinson Hyperlegible — accessibility (low vision). OFL, bundled.
    - family: Atkinson Hyperlegible
      fonts:
        - asset: assets/fonts/AtkinsonHyperlegible-Regular.ttf
        - asset: assets/fonts/AtkinsonHyperlegible-Bold.ttf
          weight: 700
    # OpenDyslexic — accessibility (dyslexia). OFL, bundled.
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf
        - asset: assets/fonts/OpenDyslexic-Bold.otf
          weight: 700
